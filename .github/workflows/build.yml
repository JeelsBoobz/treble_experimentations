name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      USE_CCACHE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git git-lfs curl wget rsync \
            bc bison build-essential flex gperf \
            zip unzip \
            gcc g++ gcc-multilib g++-multilib \
            libc6-dev-i386 lib32z1-dev lib32readline-dev \
            libelf-dev liblz4-tool lzop \
            libssl-dev libxml2 libxml2-utils \
            xsltproc squashfs-tools \
            python3 python-is-python3 \
            openjdk-17-jdk \
            ccache jq

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Make build.sh executable
        run: chmod +x build.sh

      - name: Run build.sh
        run: |
          ./build.sh android-16.0

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/*.img
            **/*.img.xz
            **/*.zip
            out/**
            output/**
          if-no-files-found: warn
